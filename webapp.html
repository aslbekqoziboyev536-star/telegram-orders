<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Xizmatlar Buyurtmasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: #1a1a1a;
            overflow-x: hidden;
            position: relative;
        }

        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Liquid background elements */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 150, 255, 0.2);
            top: -150px;
            left: -150px;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: rgba(255, 0, 150, 0.15);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
            animation-duration: 30s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: rgba(138, 43, 226, 0.1);
            top: 40%;
            right: -100px;
            animation-delay: -5s;
            animation-duration: 20s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(5%, 10%) scale(1.1);
            }

            66% {
                transform: translate(-5%, 5%) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.45) 0%, rgba(255, 255, 255, 0.25) 100%);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.08),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 30px;
            color: #1a1a1a;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .service-card.selected {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .service-card.selected::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: #00d4ff;
            font-weight: bold;
        }

        .service-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1a1a1a;
            padding: 14px 18px;
            border-radius: 16px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.6);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #8a2be2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <h1>🚀 Loyiha Buyurtma qilish</h1>

        <div class="services-grid" id="servicesGrid">
            <div class="service-card" data-service="Web Sayt">
                <div class="service-icon">🌐</div>
                <div class="service-name">Web Sayt</div>
            </div>
            <div class="service-card" data-service="Telegram Bot">
                <div class="service-icon">🤖</div>
                <div class="service-name">Telegram Bot</div>
            </div>
            <div class="service-card" data-service="Mobil Ilova">
                <div class="service-icon">📱</div>
                <div class="service-name">Mobil Ilova</div>
            </div>
            <div class="service-card" data-service="Dizayn UI/UX">
                <div class="service-icon">🎨</div>
                <div class="service-name">Dizayn (UI/UX)</div>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Telefon raqamingiz</label>
            <input type="tel" id="phone" placeholder="+998 90 123 45 67">
        </div>

        <div class="form-group">
            <label for="details">Loyiha haqida qisqacha</label>
            <textarea id="details"
                placeholder="Qanday loyiha qilishni xohlaysiz? Qanday funksiyalar bo'lishi kerak?"></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Xizmatni tanlang</button>
    </div>

    <canvas id="trail-canvas"></canvas>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let selectedServices = new Set();
        const serviceCards = document.querySelectorAll('.service-card');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');

        function updateMainButton() {
            if (selectedServices.size > 0 && phoneInput.value.trim().length > 6) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Yuborish ✨";
                tg.MainButton.text = "SO'ROVNI YUBORISH";
                tg.MainButton.show();
            } else {
                submitBtn.disabled = true;
                if (selectedServices.size === 0) {
                    submitBtn.innerText = "Hech bo'lmasa 1ta xizmat tanlang";
                } else {
                    submitBtn.innerText = "Telefon raqamingizni kiriting";
                }
                tg.MainButton.hide();
            }
        }

        serviceCards.forEach(card => {
            card.addEventListener('click', () => {
                const service = card.getAttribute('data-service');
                if (selectedServices.has(service)) {
                    selectedServices.delete(service);
                    card.classList.remove('selected');
                } else {
                    selectedServices.add(service);
                    card.classList.add('selected');
                }
                updateMainButton();
            });
        });

        phoneInput.addEventListener('input', updateMainButton);

        function submitOrder() {
            if (submitBtn.disabled) return;

            const data = {
                type: "order_webapp",
                services: Array.from(selectedServices),
                phone: phoneInput.value.trim(),
                details: document.getElementById('details').value.trim()
            };

            // Ma'lumotni botga yuborish
            tg.sendData(JSON.stringify(data));
        }

        submitBtn.addEventListener('click', submitOrder);
        tg.MainButton.onClick(submitOrder);

        // Cursor Trail Logic
        const canvas = document.getElementById('trail-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            points.push({
                x: e.clientX,
                y: e.clientY,
                time: Date.now()
            });
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();
            const duration = 1500;

            points = points.filter(p => now - p.time < duration);

            if (points.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const age = now - p.time;
                    const opacity = 1 - (age / duration);

                    ctx.strokeStyle = `rgba(0, 0, 0, ${opacity * 0.4})`;
                    ctx.lineWidth = (1 - (age / duration)) * 4 + 1; // Smooth tapering

                    if (i === 0) {
                        ctx.moveTo(p.x, p.y);
                    } else {
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
