<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Xizmatlar Buyurtmasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e0b36 0%, #301847 50%, #4a2569 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: #fff;
            overflow-x: hidden;
        }

        /* Animated background spheres */
        .bg-sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite alternate;
        }
        
        .sphere-1 {
            width: 300px; height: 300px;
            background: rgba(138, 43, 226, 0.4);
            top: -100px; left: -100px;
        }
        
        .sphere-2 {
            width: 400px; height: 400px;
            background: rgba(0, 212, 255, 0.3);
            bottom: -150px; right: -150px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            /* Liquid Glass / Glassmorphism effect */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .service-card.selected {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .service-card.selected::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: #00d4ff;
            font-weight: bold;
        }

        .service-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #8a2be2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="bg-sphere sphere-1"></div>
    <div class="bg-sphere sphere-2"></div>

    <div class="container">
        <h1>🚀 Loyiha Buyurtma qilish</h1>

        <div class="services-grid" id="servicesGrid">
            <div class="service-card" data-service="Web Sayt">
                <div class="service-icon">🌐</div>
                <div class="service-name">Web Sayt</div>
            </div>
            <div class="service-card" data-service="Telegram Bot">
                <div class="service-icon">🤖</div>
                <div class="service-name">Telegram Bot</div>
            </div>
            <div class="service-card" data-service="Mobil Ilova">
                <div class="service-icon">📱</div>
                <div class="service-name">Mobil Ilova</div>
            </div>
            <div class="service-card" data-service="Dizayn UI/UX">
                <div class="service-icon">🎨</div>
                <div class="service-name">Dizayn (UI/UX)</div>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Telefon raqamingiz</label>
            <input type="tel" id="phone" placeholder="+998 90 123 45 67">
        </div>

        <div class="form-group">
            <label for="details">Loyiha haqida qisqacha</label>
            <textarea id="details" placeholder="Qanday loyiha qilishni xohlaysiz? Qanday funksiyalar bo'lishi kerak?"></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Yuborish qulflandi</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let selectedServices = new Set();
        const serviceCards = document.querySelectorAll('.service-card');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');

        function updateMainButton() {
            if(selectedServices.size > 0 && phoneInput.value.trim().length > 6) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Yuborish ✨";
                tg.MainButton.text = "SO'ROVNI YUBORISH";
                tg.MainButton.show();
            } else {
                submitBtn.disabled = true;
                submitBtn.innerText = "Ma'lumotlarni to'ldiring";
                tg.MainButton.hide();
            }
        }

        serviceCards.forEach(card => {
            card.addEventListener('click', () => {
                const service = card.getAttribute('data-service');
                if (selectedServices.has(service)) {
                    selectedServices.delete(service);
                    card.classList.remove('selected');
                } else {
                    selectedServices.add(service);
                    card.classList.add('selected');
                }
                updateMainButton();
            });
        });

        phoneInput.addEventListener('input', updateMainButton);

        function submitOrder() {
            if(submitBtn.disabled) return;
            
            const data = {
                type: "order_webapp",
                services: Array.from(selectedServices),
                phone: phoneInput.value.trim(),
                details: document.getElementById('details').value.trim()
            };

            // Ma'lumotni botga yuborish
            tg.sendData(JSON.stringify(data));
        }

        submitBtn.addEventListener('click', submitOrder);
        tg.MainButton.onClick(submitOrder);
    </script>
</body>
</html>
