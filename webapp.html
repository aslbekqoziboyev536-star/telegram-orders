<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Xizmatlar Buyurtmasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            color: #1a1a1a;
            overflow-x: hidden;
            position: relative;
        }

        #trail-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Liquid background elements */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: move 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(0, 150, 255, 0.2);
            top: -150px;
            left: -150px;
            animation-duration: 25s;
        }

        .blob-2 {
            width: 600px;
            height: 600px;
            background: rgba(255, 0, 150, 0.15);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
            animation-duration: 30s;
        }

        .blob-3 {
            width: 400px;
            height: 400px;
            background: rgba(138, 43, 226, 0.1);
            top: 40%;
            right: -100px;
            animation-delay: -5s;
            animation-duration: 20s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(5%, 10%) scale(1.1);
            }

            66% {
                transform: translate(-5%, 5%) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            padding: 40px 25px;
            box-shadow:
                0 30px 60px -12px rgba(0, 0, 0, 0.1),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Shine effect for liquid glass */
        .container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
            border-radius: 32px 32px 0 0;
            pointer-events: none;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 30px;
            color: #1a1a1a;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .service-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .service-card.selected {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .service-card.selected::before {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 8px;
            color: #00d4ff;
            font-weight: bold;
        }

        .service-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #2c3e50;
            /* High contrast dark color */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .char-count {
            font-size: 11px;
            color: #555;
            float: right;
            margin-top: -22px;
            margin-right: 10px;
            position: relative;
            z-index: 5;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1a1a1a;
            padding: 14px 18px;
            border-radius: 16px;
            outline: none;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus,
        textarea:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #00d4ff;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.3);
            color: #000;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(90deg, #00d4ff 0%, #8a2be2 100%);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
            margin-top: 10px;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.6);
        }

        .submit-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.3);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Admin Button and Modal */
        .admin-trigger {
            margin-top: 20px;
            font-size: 12px;
            color: #2c3e50;
            text-decoration: underline;
            cursor: pointer;
            display: none;
            /* Hidden by default */
            opacity: 0.7;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            text-align: left;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: #1a1a1a;
            font-size: 22px;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .admin-dashboard-list {
            max-height: 300px;
            overflow-y: auto;
            color: #333;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div class="container">
        <h1>🚀 Loyiha Buyurtma qilish</h1>

        <div class="services-grid" id="servicesGrid">
            <div class="service-card" data-service="Web Sayt">
                <div class="service-icon">🌐</div>
                <div class="service-name">Web Sayt</div>
            </div>
            <div class="service-card" data-service="Telegram Bot">
                <div class="service-icon">🤖</div>
                <div class="service-name">Telegram Bot</div>
            </div>
            <div class="service-card" data-service="Mobil Ilova">
                <div class="service-icon">📱</div>
                <div class="service-name">Mobil Ilova</div>
            </div>
            <div class="service-card" data-service="Dizayn UI/UX">
                <div class="service-icon">🎨</div>
                <div class="service-name">Dizayn (UI/UX)</div>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Telefon raqamingiz</label>
            <input type="tel" id="phone" placeholder="+998-00-000-00-00">
        </div>

        <div class="form-group">
            <label for="details">Loyiha haqida qisqacha</label>
            <textarea id="details"
                placeholder="Qanday loyiha qilishni xohlaysiz? Qanday funksiyalar bo'lishi kerak?"></textarea>
            <div class="char-count" id="charCount">0 / 150</div>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Xizmatni tanlang</button>

        <div class="admin-trigger" id="adminBtn">⚙️ Admin Panel</div>
    </div>

    <!-- Admin Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h3>Admin Kirish</h3>
            <div class="form-group">
                <label style="color: #333">Login</label>
                <input type="text" id="adminLogin" placeholder="admin@orders.bot" style="color: #000; background: #eee">
            </div>
            <div class="form-group">
                <label style="color: #333">Parol</label>
                <input type="password" id="adminPass" placeholder="••••••••" style="color: #000; background: #eee">
            </div>
            <button class="submit-btn" id="loginBtn">Kirish</button>
        </div>
    </div>

    <!-- Admin Dashboard (Simple view) -->
    <div id="adminDashboard" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" id="closeDash">&times;</span>
            <h3 style="color: #000">🚀 Admin Boshqaruv</h3>
            <p style="color: #444; margin-bottom: 20px;">Loyiha xizmatlari va bilimlar bazasini bot orqali boshqaring
                (/add_info buyrug'i).</p>
            <div style="max-height: 300px; overflow-y: auto; color: #1a1a1a;" id="adminInfo">
                <!-- Stats or info could go here -->
                <p>Status: Tizim faol</p>
                <p>Mijozlar soni: O'sib bormoqda</p>
            </div>
        </div>
    </div>

    <canvas id="trail-canvas"></canvas>

    <script>
        let tg = window.Telegram.WebApp;
        const ADMIN_ID = "7342611753"; // From config
        tg.expand();

        // Check if current user is admin
        if (tg.initDataUnsafe.user && String(tg.initDataUnsafe.user.id) === ADMIN_ID) {
            document.getElementById('adminBtn').style.display = 'block';
        }

        let selectedServices = new Set();
        const serviceCards = document.querySelectorAll('.service-card');
        const phoneInput = document.getElementById('phone');
        const detailsInput = document.getElementById('details');
        const submitBtn = document.getElementById('submitBtn');
        const charCount = document.getElementById('charCount');

        // Phone mask init
        const phoneMask = IMask(phoneInput, {
            mask: '+{000}-{00}-{000}-{00}-{00}'
        });

        function updateMainButton() {
            const isPhoneComplete = phoneMask.masked.isComplete;
            const detailsText = detailsInput.value.trim();
            const isDetailsValid = detailsText.length >= 150;

            charCount.innerText = `${detailsText.length} / 150`;
            charCount.style.color = isDetailsValid ? "#27ae60" : "#e74c3c";

            if (selectedServices.size > 0 && isPhoneComplete && isDetailsValid) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Yuborish ✨";
                tg.MainButton.text = "SO'ROVNI YUBORISH";
                tg.MainButton.show();
            } else {
                submitBtn.disabled = true;
                if (selectedServices.size === 0) {
                    submitBtn.innerText = "Xizmatni tanlang";
                } else if (!isPhoneComplete) {
                    submitBtn.innerText = "Tel: +###-##-###-##-##";
                } else {
                    submitBtn.innerText = `Kamida ${150 - detailsText.length} ta belgi qoldi`;
                }
                tg.MainButton.hide();
            }
        }

        serviceCards.forEach(card => {
            card.addEventListener('click', () => {
                const service = card.getAttribute('data-service');
                if (selectedServices.has(service)) {
                    selectedServices.delete(service);
                    card.classList.remove('selected');
                } else {
                    selectedServices.add(service);
                    card.classList.add('selected');
                }
                updateMainButton();
            });
        });

        phoneInput.addEventListener('input', updateMainButton);
        detailsInput.addEventListener('input', updateMainButton);

        function submitOrder() {
            if (submitBtn.disabled) return;

            const data = {
                type: "order_webapp",
                services: Array.from(selectedServices),
                phone: phoneInput.value.trim(),
                details: document.getElementById('details').value.trim()
            };

            // Ma'lumotni botga yuborish
            tg.sendData(JSON.stringify(data));
        }

        submitBtn.addEventListener('click', submitOrder);
        tg.MainButton.onClick(submitOrder);

        // Admin Logic
        const loginModal = document.getElementById('loginModal');
        const adminDashboard = document.getElementById('adminDashboard');
        const adminBtn = document.getElementById('adminBtn');
        const loginBtn = document.getElementById('loginBtn');
        const adminLogin = document.getElementById('adminLogin');
        const adminPass = document.getElementById('adminPass');

        adminBtn.onclick = () => loginModal.style.display = 'flex';
        document.getElementById('closeModal').onclick = () => loginModal.style.display = 'none';
        document.getElementById('closeDash').onclick = () => adminDashboard.style.display = 'none';

        loginBtn.onclick = () => {
            if (adminLogin.value === "admin@orders.bot" && adminPass.value === "OrdersforCogy") {
                loginModal.style.display = 'none';
                adminDashboard.style.display = 'flex';
            } else {
                alert("Login yoki parol xato! ❌");
            }
        };

        window.onclick = (event) => {
            if (event.target == loginModal) loginModal.style.display = "none";
            if (event.target == adminDashboard) adminDashboard.style.display = "none";
        };

        // Cursor Trail Logic
        const canvas = document.getElementById('trail-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            points.push({
                x: e.clientX,
                y: e.clientY,
                time: Date.now()
            });
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();
            const duration = 1500;

            points = points.filter(p => now - p.time < duration);

            if (points.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const age = now - p.time;
                    const opacity = 1 - (age / duration);

                    ctx.strokeStyle = `rgba(0, 0, 0, ${opacity * 0.4})`;
                    ctx.lineWidth = (1 - (age / duration)) * 4 + 1; // Smooth tapering

                    if (i === 0) {
                        ctx.moveTo(p.x, p.y);
                    } else {
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>

</html>
